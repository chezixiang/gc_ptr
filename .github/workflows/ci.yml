name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mingw-ucrt (multi-thread)
            msystem: UCRT64
            cxx: g++
            install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I. -DGPTR_THREAD
            ldflags: -lgtest -lgtest_main -pthread

          - name: mingw-ucrt (single-thread)
            msystem: UCRT64
            cxx: g++
            install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I.
            ldflags: -lgtest -lgtest_main

          - name: mingw-ucrt (ASan + multi-thread)
            msystem: UCRT64
            cxx: g++
            install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I. -DGPTR_THREAD -fsanitize=address -static-libasan
            ldflags: -lgtest -lgtest_main -pthread -fsanitize=address -static-libasan

          - name: clang64 (multi-thread)
            msystem: CLANG64
            cxx: clang++
            install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I. -DGPTR_THREAD
            ldflags: -lgtest -lgtest_main -pthread

          - name: clang64 (single-thread)
            msystem: CLANG64
            cxx: clang++
            install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I.
            ldflags: -lgtest -lgtest_main

          - name: clang64 (UBSan + multi-thread)
            msystem: CLANG64
            cxx: clang++
            install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-gtest
            cxxflags: >-
              -std=c++17 -Wall -Wextra -Wpedantic -g -I.
              -DGPTR_THREAD
              -fsanitize=undefined
              -fno-sanitize-recover=undefined
            ldflags: -lgtest -lgtest_main -pthread -fsanitize=undefined

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            ${{ matrix.install }}

      - name: Build and test
        run: |
          make clean
          make test CXX="${{ matrix.cxx }}" CXXFLAGS="${{ matrix.cxxflags }}" LDFLAGS="${{ matrix.ldflags }}"
