name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mingw-ucrt (multi-thread)
            msystem: UCRT64
            cxx: g++
            install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I. -DGPTR_THREAD
            ldflags: -lgtest -lgtest_main -pthread

          - name: mingw-ucrt (single-thread)
            msystem: UCRT64
            cxx: g++
            install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I.
            ldflags: -lgtest -lgtest_main

          - name: clang64 (ASan + multi-thread)
            msystem: CLANG64
            cxx: clang++
            install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-gtest
            cxxflags: >-
              -std=c++17 -Wall -Wextra -Wpedantic -g -I.
              -DGPTR_THREAD
              -fsanitize=address
            ldflags: -lgtest -lgtest_main -pthread -fsanitize=address

          - name: clang64 (multi-thread)
            msystem: CLANG64
            cxx: clang++
            install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I. -DGPTR_THREAD
            ldflags: -lgtest -lgtest_main -pthread

          - name: clang64 (single-thread)
            msystem: CLANG64
            cxx: clang++
            install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-gtest
            cxxflags: -std=c++17 -Wall -Wextra -Wpedantic -g -I.
            ldflags: -lgtest -lgtest_main

          - name: clang64 (UBSan + multi-thread)
            msystem: CLANG64
            cxx: clang++
            install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-gtest
            cxxflags: >-
              -std=c++17 -Wall -Wextra -Wpedantic -g -I.
              -DGPTR_THREAD
              -fsanitize=undefined
              -fno-sanitize-recover=undefined
            ldflags: -lgtest -lgtest_main -pthread -fsanitize=undefined

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            ${{ matrix.install }}

      - name: Build and test
        run: |
          make clean
          make test CXX="${{ matrix.cxx }}" CXXFLAGS="${{ matrix.cxxflags }}" LDFLAGS="${{ matrix.ldflags }}"

  msvc:
    name: MSVC 2022 (multi-thread)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install gtest
        run: |
          git clone --depth 1 --branch v1.14.0 https://github.com/google/googletest.git

      - name: Build and test
        shell: cmd
        run: |
          cl /std:c++17 /W4 /DGPTR_THREAD /EHsc /I. /Igoogletest\googletest /Igoogletest\googletest\include /Itests ^
            tests\gc_ptr_test.cpp ^
            googletest\googletest\src\gtest-all.cc ^
            googletest\googletest\src\gtest_main.cc ^
            /Fe:gc_ptr_test.exe
          gc_ptr_test.exe
